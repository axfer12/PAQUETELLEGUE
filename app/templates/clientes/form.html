{% extends "base.html" %}
{% block title %}{{ accion }} Cliente - PAQUETELLEGUE{% endblock %}
{% block content %}
<div class="page-header">
  <h2 class="page-title">{{ accion }} Cliente</h2>
  <a href="{{ url_for('clientes.lista') }}" class="btn btn-secondary">← Volver</a>
</div>
<form method="POST" style="max-width:700px">
  <div class="card">
    <div class="card-title">Datos Personales</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Nombre *</label>
        <input name="nombre" class="form-input" value="{{ cliente.get('nombre','') }}" required autofocus/>
      </div>
      <div class="form-group">
        <label>Empresa</label>
        <input name="empresa" class="form-input" value="{{ cliente.get('empresa','') }}"/>
      </div>
      <div class="form-group">
        <label>Telefono</label>
        <input name="telefono" class="form-input" value="{{ cliente.get('telefono','') }}"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input name="email" type="email" class="form-input" value="{{ cliente.get('email','') }}"/>
      </div>
      <div class="form-group">
        <label>RFC</label>
        <input name="rfc" class="form-input" value="{{ cliente.get('rfc','') }}"/>
      </div>
      <div class="form-group">
        <label>C.P.</label>
        <input name="cp" class="form-input" value="{{ cliente.get('cp','') }}" oninput="autoCP(this.value)"/>
      </div>
      <div class="form-group span-2">
        <label>Direccion (calle y numero)</label>
        <input name="direccion" class="form-input" value="{{ cliente.get('direccion','') }}"/>
      </div>
      <div class="form-group">
        <label>Colonia</label>
        <input name="colonia" id="f_colonia" class="form-input" value="{{ cliente.get('colonia','') }}"/>
      </div>
      <div class="form-group">
        <label>Ciudad</label>
        <input name="ciudad" id="f_ciudad" class="form-input" value="{{ cliente.get('ciudad','') }}"/>
      </div>
      <div class="form-group">
        <label>Estado</label>
        <input name="estado" id="f_estado" class="form-input" value="{{ cliente.get('estado','') }}"/>
      </div>
      <div class="form-group span-2">
        <label>Notas</label>
        <input name="notas" class="form-input" value="{{ cliente.get('notas','') }}" placeholder="Instrucciones especiales, referencias..."/>
      </div>
    </div>
  </div>
  <div style="display:flex;gap:10px">
    <button type="submit" class="btn btn-primary btn-lg">{{ accion }} Cliente</button>
    <a href="{{ url_for('clientes.lista') }}" class="btn btn-secondary btn-lg">Cancelar</a>
  </div>
</form>
{% endblock %}
{% block scripts %}
<script>
const _cpCache = {};
async function autoCP(cp) {
  if (cp.length !== 5) return;
  if (_cpCache[cp]) { llenar(_cpCache[cp]); return; }
  try {
    const r = await fetch('/api/buscar-cp/' + cp);
    const d = await r.json();
    if (d && d.colonia) { _cpCache[cp] = d; llenar(d); }
  } catch(e) {}
}
function llenar(d) {
  if (d.colonia) document.getElementById('f_colonia').value = d.colonia;
  if (d.ciudad)  document.getElementById('f_ciudad').value  = d.ciudad;
  if (d.estado)  document.getElementById('f_estado').value  = d.estado;
}
</script>
{% endblock %}
